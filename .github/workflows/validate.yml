name: validate

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: make check's drift build derives source_commit from
          # `git log` over each skill's source files; a shallow clone would
          # yield an empty/None source_commit and fail the rebuild.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Califa tooling + SkillSpector
        run: make tools
      - name: Lint, scan, gate, validate cards, check index
        run: make check
      - name: Upload per-skill SARIF to the Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skills
